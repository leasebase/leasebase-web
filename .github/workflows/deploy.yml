name: Deploy Web

on:
  push:
    branches:
      - develop
      - qa
      - main
      - 'release/*'

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY_PREFIX: leasebase
  ECS_CLUSTER_PREFIX: leasebase
  ECS_SERVICE_SUFFIX: web-service

jobs:
  deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          
          if [[ "$BRANCH" == "develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-dev-alb-414894289.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
            echo "web_url=https://dev.leasebase.co" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qa" ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-qa-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == release/* ]]; then
            echo "environment=uat" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-uat-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-prod-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_DEPLOY_ROLE_{0}', steps.env.outputs.environment)] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ steps.env.outputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.env.outputs.api_url }}
        run: |
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}-${ENV}-web"
          
          docker build \
            --build-arg API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        env:
          ENV: ${{ steps.env.outputs.environment }}
        run: |
          TASK_DEF="${ECS_CLUSTER_PREFIX}-${ENV}-web-task"
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition' \
            --output json > task-def.json
          
          # Remove fields that can't be used when registering a new revision
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > new-task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: new-task-def.json
          container-name: web
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_CLUSTER_PREFIX }}-${{ steps.env.outputs.environment }}-${{ env.ECS_SERVICE_SUFFIX }}
          cluster: ${{ env.ECS_CLUSTER_PREFIX }}-${{ steps.env.outputs.environment }}-cluster
          wait-for-service-stability: ${{ steps.env.outputs.environment == 'prod' }}

      - name: Verify web deployment (Next.js HTML/assets)
        if: steps.env.outputs.environment == 'dev'
        env:
          WEB_URL: ${{ steps.env.outputs.web_url }}
        run: |
          echo "Verifying Next.js deployment at $WEB_URL"
          HTML=$(curl -fsSL "$WEB_URL/") || { echo "Failed to fetch HTML from $WEB_URL"; exit 1; }
          if [ -z "$HTML" ]; then
            echo "Empty HTML response from $WEB_URL"; exit 1; fi

          ASSET_PATH=$(echo "$HTML" | grep -oE '/_next/static/[^"]+\.js' | head -n1 || true)
          if [ -z "$ASSET_PATH" ]; then
            echo "Could not find a /_next/static/*.js asset in the HTML from $WEB_URL"; exit 1; fi
          echo "Found asset path: $ASSET_PATH"

          ASSET_URL="$WEB_URL$ASSET_PATH"
          echo "Fetching asset from $ASSET_URL"
          # Store body to a file and capture headers
          ASSET_HEADERS=$(curl -fsSL -D - -o /tmp/next-asset.js "$ASSET_URL" | tr -d '\r') || { echo "Failed to fetch asset from $ASSET_URL"; exit 1; }
          STATUS_LINE=$(echo "$ASSET_HEADERS" | head -n1)
          echo "Asset status: $STATUS_LINE"
          echo "$STATUS_LINE" | grep -q " 200 " || { echo "Asset request did not return HTTP 200"; exit 1; }

          CONTENT_TYPE=$(echo "$ASSET_HEADERS" | awk -F': ' 'tolower($1)=="content-type" {print tolower($2); exit}')
          echo "Asset Content-Type: $CONTENT_TYPE"
          if echo "$CONTENT_TYPE" | grep -qi 'text/html'; then
            echo "Asset Content-Type is HTML, which indicates a mis-routing of /_next/static/*"; exit 1; fi

          HEAD_BYTES=$(head -c 200 /tmp/next-asset.js || true)
          if echo "$HEAD_BYTES" | grep -qi '<!doctype html'; then
            echo "Asset body looks like HTML rather than JS; deployment is serving incorrect content for /_next/static"; exit 1; fi

          BUILD_ID=$(echo "$HTML" | grep -oE '"buildId":"[^"]+"' | head -n1 | sed -E 's/"buildId":"([^"]+)"/\1/' || true)
          if [ -z "$BUILD_ID" ]; then
            echo "Warning: Could not extract Next.js buildId from HTML; skipping buildId consistency check"; exit 0; fi
          echo "Extracted buildId: $BUILD_ID"

          if ! echo "$ASSET_PATH" | grep -q "$BUILD_ID"; then
            echo "Mismatch: HTML buildId ($BUILD_ID) does not appear in asset path ($ASSET_PATH)"; exit 1; fi

          echo "Next.js HTML and static asset appear consistent for buildId $BUILD_ID"
