name: Deploy Web

on:
  push:
    branches:
      - develop
      - qa
      - main
      - 'release/*'

env:
  AWS_REGION: us-west-1
  ECR_REPOSITORY_PREFIX: leasebase
  ECS_CLUSTER_PREFIX: leasebase
  ECS_SERVICE_SUFFIX: web-service

jobs:
  deploy:
    name: Build and Deploy Web
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          echo "Branch: $BRANCH"
          
          if [[ "$BRANCH" == "develop" ]]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-dev-alb-414894289.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "qa" ]]; then
            echo "environment=qa" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-qa-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == release/* ]]; then
            echo "environment=uat" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-uat-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "api_url=http://leasebase-prod-alb.us-west-1.elb.amazonaws.com" >> $GITHUB_OUTPUT
          else
            echo "Unknown branch: $BRANCH"
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[format('AWS_DEPLOY_ROLE_{0}', steps.env.outputs.environment)] }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ENV: ${{ steps.env.outputs.environment }}
          IMAGE_TAG: ${{ github.sha }}
          NEXT_PUBLIC_API_BASE_URL: ${{ steps.env.outputs.api_url }}
        run: |
          ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX}-${ENV}-web"
          
          docker build \
            --build-arg API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        env:
          ENV: ${{ steps.env.outputs.environment }}
        run: |
          TASK_DEF="${ECS_CLUSTER_PREFIX}-${ENV}-web-task"
          aws ecs describe-task-definition \
            --task-definition $TASK_DEF \
            --query 'taskDefinition' \
            --output json > task-def.json
          
          # Remove fields that can't be used when registering a new revision
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' task-def.json > new-task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: new-task-def.json
          container-name: web
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_CLUSTER_PREFIX }}-${{ steps.env.outputs.environment }}-${{ env.ECS_SERVICE_SUFFIX }}
          cluster: ${{ env.ECS_CLUSTER_PREFIX }}-${{ steps.env.outputs.environment }}-cluster
          wait-for-service-stability: ${{ steps.env.outputs.environment == 'prod' }}
